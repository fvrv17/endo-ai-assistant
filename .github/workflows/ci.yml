name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile sources
        run: python -m compileall src examples tests

      - name: Run unit tests
        run: PYTHONPATH=src:. python -m unittest

      - name: Run synthetic eval report
        run: PYTHONPATH=src python -m endo_ai_assistant.cli --eval eval_cases/synthetic_endoscopy.json
